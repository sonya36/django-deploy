- hosts: node
  become: yes

  vars_files:
    - group_vars/node.yml

  tasks:
    - name: Update apt
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - git
          - curl
          - nginx
        state: present

    - name: Install Node.js runtime
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
        apt-get install -y nodejs
      args:
        executable: /bin/bash

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    - name: Remove old project directory
      file:
        path: "{{ project_dir }}"
        state: absent

    - name: Recreate project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: "{{ branch }}"
        update: yes
        force: yes
      become_user: ubuntu

    - name: Install Node.js dependencies
      npm:
        path: "{{ project_dir }}"

    - name: Start Node application with PM2
      become_user: ubuntu
      shell: |
        pm2 start app.js --name {{ app_name }}
      args:
        chdir: "{{ project_dir }}"

    - name: Save PM2 process list
      become_user: ubuntu
      command: pm2 save

    - name: Configure Nginx for Node app
      template:
        src: templates/nginx_node.conf.j2
        dest: /etc/nginx/sites-available/{{ app_name }}
        owner: root
        group: root
        mode: "0644"

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/{{ app_name }}
        dest: /etc/nginx/sites-enabled/{{ app_name }}
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted