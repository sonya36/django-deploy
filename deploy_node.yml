- hosts: node
  become: yes

  vars_files:
    - group_vars/node.yml

  tasks:

  - name: Update apt
    apt:
      update_cache: yes

  - name: Install dependencies
    apt:
      name:
        - git
        - curl
        - nginx
      state: present

  - name: Install Node runtime
    shell: |
      curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      apt-get install -y nodejs
    args:
      executable: /bin/bash

  - name: Install PM2
    npm:
      name: pm2
      global: yes

  - name: Create project directory
    file:
      path: "{{ project_dir }}"
      state: directory

  - name: Clone repository
    git:
      repo: "{{ repo_url }}"
      dest: "{{ project_dir }}"
      version: "{{ branch }}"
      force: yes

  - name: Install node dependencies
    npm:
      path: "{{ project_dir }}"

  - name: Start Node application
    shell: pm2 start app.js --name {{ app_name }} || pm2 restart {{ app_name }}
    args:
      chdir: "{{ project_dir }}"

  - name: Save PM2 process list
    command: pm2 save

  - name: Configure nginx
    template:
      src: templates/nginx_node.conf.j2
      dest: /etc/nginx/sites-available/{{ app_name }}

  - name: Enable nginx site
    file:
      src: /etc/nginx/sites-available/{{ app_name }}
      dest: /etc/nginx/sites-enabled/{{ app_name }}
      state: link

  - name: Remove default nginx
    file:
      path: /etc/nginx/sites-enabled/default
      state: absent

  - name: Restart nginx
    service:
      name: nginx
      state: restarted